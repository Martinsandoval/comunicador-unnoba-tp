<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title><h:outputText value="#{bundle.title}"/></title>
        <h:outputStylesheet name="css.css" library="css"/>
        <h:outputStylesheet name="bootstrap.css" library="css"/>
        <link rel="shortcut icon" href="#{request.contextPath}/resources/imagenes/comunicador.png" type="image/x-icon"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
        <style>
            /* ── Navbar overrides ──────────────────────────────────────── */
            .navbar-inverse {
                background-color: #1a2d4e;
                border: none;
                box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            }
            .navbar-inverse .navbar-brand {
                color: #fff;
                font-weight: 700;
                font-size: 17px;
                letter-spacing: 0.2px;
                padding: 12px 16px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .navbar-inverse .navbar-brand:hover { color: #fff; opacity: 0.9; }
            .navbar-brand-logo {
                width: 26px;
                height: 26px;
                border-radius: 6px;
                object-fit: contain;
                background: rgba(255,255,255,0.1);
                padding: 2px;
                vertical-align: middle;
                margin-right: 6px;
            }
            .navbar-inverse .navbar-nav > li > a {
                color: rgba(255,255,255,0.72);
                font-size: 13.5px;
                font-weight: 500;
                padding: 16px 14px;
                transition: color 0.15s, background 0.15s;
            }
            .navbar-inverse .navbar-nav > li > a:hover,
            .navbar-inverse .navbar-nav > li > a:focus {
                color: #fff;
                background: rgba(255,255,255,0.08);
            }
            .navbar-inverse .navbar-nav > .active > a,
            .navbar-inverse .navbar-nav > .active > a:hover,
            .navbar-inverse .navbar-nav > .active > a:focus {
                color: #fff;
                background: rgba(255,255,255,0.14);
            }
            /* Thin blue accent under active link */
            .navbar-inverse .navbar-nav > .active > a {
                box-shadow: inset 0 -3px 0 #41a9e0;
            }
            /* Admin section label */
            .nav-section-label {
                color: rgba(255,255,255,0.3) !important;
                font-size: 10px !important;
                font-weight: 700 !important;
                letter-spacing: 0.8px !important;
                text-transform: uppercase !important;
                padding: 18px 14px 6px !important;
                cursor: default !important;
                pointer-events: none;
            }
            .nav-section-label:hover { background: transparent !important; }
            /* Vertical divider */
            .navbar-inverse .navbar-nav .nav-divider {
                width: 1px;
                background: rgba(255,255,255,0.12);
                margin: 10px 6px;
                padding: 0;
            }
            /* User section */
            .navbar-user {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 0 8px;
            }
            .navbar-user .user-avatar {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgba(255,255,255,0.15);
                color: #fff;
                font-size: 13px;
                font-weight: 700;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                text-transform: uppercase;
            }
            .navbar-user .user-name {
                color: rgba(255,255,255,0.85);
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
            }
            .btn-logout {
                background: rgba(255,255,255,0.10);
                color: rgba(255,255,255,0.80);
                border: 1px solid rgba(255,255,255,0.20);
                border-radius: 6px;
                font-size: 12px;
                font-weight: 500;
                padding: 5px 12px;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
                white-space: nowrap;
            }
            .btn-logout:hover {
                background: rgba(255,255,255,0.18);
                color: #fff;
            }
            .navbar-right-wrapper {
                float: right;
                margin: 8px 0;
            }
        </style>
    </h:head>

    <h:body>
        <nav class="navbar navbar-inverse" role="navigation">
            <div class="container-fluid">
                <div class="navbar-header">
                    <button type="button" class="navbar-toggle collapsed"
                            data-toggle="collapse" data-target="#navbar-main"
                            aria-expanded="false">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <a class="navbar-brand" href="#{request.contextPath}/welcome.xhtml">
                        <img class="navbar-brand-logo"
                             src="#{request.contextPath}/resources/imagenes/comunicador.png"
                             alt="logo"/>
                        Comunicador
                    </a>
                </div>

                <div class="collapse navbar-collapse" id="navbar-main">

                    <!-- Left nav: public pages -->
                    <ul class="nav navbar-nav">
                        <li class="#{facesContext.viewRoot.viewId == '/welcome.xhtml' ? 'active' : ''}">
                            <a href="#{request.contextPath}/welcome.xhtml">Inicio</a>
                        </li>
                        <li class="#{facesContext.viewRoot.viewId == '/comunicador.xhtml' ? 'active' : ''}">
                            <a href="#{request.contextPath}/comunicador.xhtml">Comunicador</a>
                        </li>

                        <!-- Admin links: only when logged in -->
                        <ui:fragment rendered="#{backingUsuario.username != null}">
                            <li class="nav-divider"></li>
                            <li><a class="nav-section-label" href="#">Admin</a></li>
                            <li class="#{facesContext.viewRoot.viewId == '/admin/tematicas/index.xhtml' ? 'active' : ''}">
                                <a href="#{request.contextPath}/admin/tematicas/index.xhtml">Temáticas</a>
                            </li>
                            <li class="#{facesContext.viewRoot.viewId == '/admin/elementositeractivos/index.xhtml' ? 'active' : ''}">
                                <a href="#{request.contextPath}/admin/elementositeractivos/index.xhtml">Elementos</a>
                            </li>
                        </ui:fragment>
                    </ul>

                    <!-- Right: user info + logout -->
                    <h:form styleClass="navbar-right-wrapper" rendered="#{backingUsuario.username != null}">
                        <div class="navbar-user">
                            <div class="user-avatar">
                                <h:outputText value="#{backingUsuario.username.substring(0,1)}"/>
                            </div>
                            <span class="user-name">
                                <h:outputText value="#{backingUsuario.username}"/>
                            </span>
                            <h:commandButton styleClass="btn-logout"
                                             value="Cerrar sesión"
                                             action="#{backingUsuario.logout}"/>
                        </div>
                    </h:form>

                </div>
            </div>
        </nav>

        <ui:insert name="content"/>
    </h:body>
</html>
