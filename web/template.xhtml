<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title><h:outputText value="#{bundle.title}"/></title>
        <h:outputStylesheet name="css.css" library="css"/>
        <h:outputStylesheet name="bootstrap.css" library="css"/>
        <link rel="shortcut icon" href="#{request.contextPath}/resources/imagenes/comunicador.png" type="image/x-icon"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
    </h:head>

    <h:body>
        <nav class="navbar navbar-inverse" role="navigation">
            <div class="container-fluid">
                <div class="navbar-header">
                    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-main">
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                </div>
                <div class="collapse navbar-collapse" id="navbar-main">
                    <ul class="nav navbar-nav">
                        <li><a href="#{request.contextPath}/welcome.xhtml">Inicio</a></li>
                        <li><a href="#{request.contextPath}/comunicador.xhtml">Comunicador</a></li>
                        <li><a href="#{request.contextPath}/admin/tematicas/index.xhtml">Tematicas</a></li>
                        <li><a href="#{request.contextPath}/admin/elementositeractivos/index.xhtml">Elementos Interactivos</a></li>
                    </ul>
                    <h:form styleClass="navbar-form navbar-right" rendered="#{backingUsuario.username != null}">
                        <span class="navbar-text" style="margin-right: 10px; color: #9d9d9d;">
                            <h:outputText value="#{bundle.welcome}, #{backingUsuario.username}"/>
                        </span>
                        <h:commandButton styleClass="btn btn-default btn-sm"
                                         value="#{bundle.logout}"
                                         action="#{backingUsuario.logout}"/>
                    </h:form>
                </div>
            </div>
        </nav>

        <ui:insert name="content"/>
    </h:body>
</html>
